server {
    listen 80;
    server_name www.pract.space pract.space;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name www.pract.space pract.space;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/pract.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pract.space/privkey.pem;

    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }

    location /api/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    location /admin/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    location /s/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://backend:8000;
    }

    location /media/ {
        alias /usr/share/nginx/html/media/;
    }

    location /static/admin/ {
        alias /usr/share/nginx/html/staticfiles/admin/;
    }

    location /static/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }
}
