services:
  db:
    image: postgres:16-alpine
    container_name: foodgram-db
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-foodgram_user} -d ${POSTGRES_DB:-foodgram}
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: ../backend
    image: ${DOCKER_USERNAME}/foodgram-backend:latest
    container_name: foodgram-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/static
    env_file: .env

  frontend:
    container_name: foodgram-front
    build: ../frontend
    image: ${DOCKER_USERNAME}/foodgram-frontend:latest
    volumes:
      - frontend_build:/app/result_build/

  nginx:
    container_name: foodgram-proxy
    image: nginx:1.25.4-alpine
    restart: always
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - frontend_build:/usr/share/nginx/html/
      - ../docs/:/usr/share/nginx/html/api/docs/
      - static_data:/usr/share/nginx/html/staticfiles/
      - media_data:/usr/share/nginx/html/media/

volumes:
  pg_data:
  media_data:
  static_data:
  frontend_build: